plugins {
  id 'com.android.application'
  id 'org.jetbrains.kotlin.android'
}

android {
  namespace 'com.falafina.app'
  compileSdk 34

  defaultConfig {
    applicationId "com.falafina.app"
    minSdk 24
    targetSdk 34
    versionCode 1
    versionName "1.0"
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = '17'
  }
}

dependencies {
  // Trusted Web Activity: o FalaFina roda no motor do Chrome DENTRO do app
  // (áudio, microfone e notificações funcionam de verdade)
  implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
